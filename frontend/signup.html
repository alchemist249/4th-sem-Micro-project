<!DOCTYPE html>
<html>
<head>
    <title>NGO Signup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <h2>NGO Signup</h2>

    <form id="signupForm">

        <input
            type="text"
            id="ngoName"
            placeholder="NGO Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Sign Up
        </button>

    </form>

</div>

<script src="js/app.js"></script>

</body>
</html>
