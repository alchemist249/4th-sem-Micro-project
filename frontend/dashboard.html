<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <h1>HealthBridge</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="basics.html">Healthcare Basics</a></li>
            <li><a href="login.html">NGO Login</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>
</header>

<div class="dashboard">
    <h2>Create Healthcare Drive</h2>

    <form id="driveForm">
        <input type="text" id="driveTitle" placeholder="Drive Title" required>
        <input type="text" id="driveLocation" placeholder="Location" required>
        <input type="text" id="driveInstitution" placeholder="Institution" required>
        <input type="date" id="driveDate" required>

        <textarea id="driveDescription" placeholder="Description"></textarea>

        <button type="submit">Create Drive</button>
    </form>
    
    <hr class="form-divider">

    <h2>All Healthcare Drives</h2>

    <div id="myDrives">
        </div>
</div>

<div id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
  <div id="modalBox" style="background:#1e293b; border: 1px solid rgba(255,255,255,0.15); border-radius:12px; width:90%; max-width:480px; max-height:75vh; display:flex; flex-direction:column; overflow:hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.1);">
      <h3 id="modalTitle" style="margin:0; font-size:18px; color:#fff; font-weight:600;"></h3>
      <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:#94a3b8; padding:0; box-shadow:none; backdrop-filter:none;-webkit-backdrop-filter:none;">&times;</button>
    </div>
    <div id="modalContent" style="overflow-y:auto; padding:16px 20px; flex:1; color:#f8fafc;"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
