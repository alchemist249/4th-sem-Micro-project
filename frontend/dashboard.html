<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">
    <h2>Create Healthcare Drive</h2>

    <form id="driveForm">
        <input type="text" id="driveTitle" placeholder="Drive Title" required>
        <input type="text" id="driveLocation" placeholder="Location" required>
        <input type="text" id="driveInstitution" placeholder="Institution" required>
        <input type="date" id="driveDate" required>

        <textarea id="driveDescription" placeholder="Description"></textarea>

        <button type="submit">Create Drive</button>
    </form>
    <hr>

<h2>Your Healthcare Drives</h2>

<div id="myDrives">

</div>

<div id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
  <div id="modalBox" style="background:#fff; border-radius:12px; width:90%; max-width:480px; max-height:75vh; display:flex; flex-direction:column; overflow:hidden;">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #eee;">
      <h3 id="modalTitle" style="margin:0; font-size:16px;"></h3>
      <button onclick="closeModal()" style="background:none; border:none; font-size:22px; cursor:pointer; color:#666;">&times;</button>
    </div>
    <div id="modalContent" style="overflow-y:auto; padding:16px 20px; flex:1;"></div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
